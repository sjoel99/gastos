services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gastos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gastos}
      POSTGRES_DB: ${POSTGRES_DB:-gastos}
    volumes:
      - gastos-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gastos}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    image: gastos:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-gastos}:${POSTGRES_PASSWORD:-gastos}@db:5432/${POSTGRES_DB:-gastos}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      AUTH_TRUST_HOST: "true"
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      ALLOWED_EMAILS: ${ALLOWED_EMAILS}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      CRON_SECRET: ${CRON_SECRET}
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://localhost:3000/sign-in >/dev/null 2>&1 || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Aviso diário às 9h (timezone America/Sao_Paulo).
  cron:
    image: alpine:3.20
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      TZ: America/Sao_Paulo
      CRON_SECRET: ${CRON_SECRET}
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl tzdata >/dev/null
        cp /usr/share/zoneinfo/America/Sao_Paulo /etc/localtime
        echo "America/Sao_Paulo" > /etc/timezone
        echo "0 9 * * * curl -s -X POST -H 'Authorization: Bearer ${CRON_SECRET}' http://app:3000/api/cron/daily-reminder >> /var/log/cron.log 2>&1" > /etc/crontabs/root
        crond -f -L /var/log/cron.log

volumes:
  gastos-db:
